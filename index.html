<style>
  :root{
    --navy:#0B1F3A; --navy-light:#132a4d; --gold:#C89B3C; --gold-light:#e0bc6a;
    --bg:#FFFFFF; --accent:#F5F7FA; --success:#1C8A5A; --warning:#B7791F; --danger:#C0392B;
    --ink:#101828; --sub:#5b6472; --border:#e7eaee; --card:#ffffff;
  }
  html.dark{ --bg:#0a1524; --accent:#0f1e33; --ink:#eef2f7; --sub:#9aa7ba; --border:#1c2e46; --card:#0f1e33; --navy:#08162b; }
  *{box-sizing:border-box}
  html, body{ overflow-x:hidden; width:100%; max-width:100vw; }
  body{ font-family:'Inter',sans-serif; background:var(--bg); color:var(--ink); transition:background .25s ease, color .25s ease; }
  ::-webkit-scrollbar{width:8px;height:8px} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px} ::-webkit-scrollbar-track{background:transparent}
  .glass{ background: color-mix(in srgb, var(--card) 88%, transparent); backdrop-filter: blur(14px); border:1px solid var(--border); }
  .card{ background:var(--card); border:1px solid var(--border); border-radius:14px; transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease; }
  .card:hover{ transform: translateY(-2px); box-shadow: 0 12px 28px -12px rgba(11,31,58,.18); border-color: color-mix(in srgb, var(--gold) 40%, var(--border)); }
  .btn{ display:inline-flex;align-items:center;gap:.5rem; padding:.55rem 1.05rem;border-radius:10px;font-weight:600;font-size:.85rem; transition:.18s ease; white-space:nowrap; cursor:pointer; border:1px solid transparent; }
  .btn-primary{ background:var(--navy); color:#fff; } .btn-primary:hover{ background:var(--navy-light); box-shadow:0 6px 18px -6px rgba(11,31,58,.5); }
  .btn-gold{ background:var(--gold); color:#231703; } .btn-gold:hover{ background:var(--gold-light); box-shadow:0 6px 18px -6px rgba(200,155,60,.55); }
  .btn-outline{ background:transparent; border-color:var(--border); color:var(--ink); } .btn-outline:hover{ border-color:var(--gold); color:var(--gold); }
  .btn-ghost{ background:var(--accent); color:var(--ink); } .btn-ghost:hover{ background:var(--border); }
  .btn-danger{ background:rgba(192,57,43,.1); color:var(--danger); } .btn-danger:hover{ background:rgba(192,57,43,.18); }
  .btn-sm{ padding:.35rem .7rem; font-size:.75rem; border-radius:8px; }
  .icon-btn{ width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border-radius:9px;background:var(--accent);color:var(--sub);transition:.15s; cursor:pointer; border:1px solid var(--border);}
  .icon-btn:hover{ color:var(--gold); border-color:var(--gold); }
  .badge{ font-size:.68rem; font-weight:700; padding:.22rem .6rem; border-radius:999px; letter-spacing:.02em; text-transform:uppercase; }
  .badge-success{ background:rgba(28,138,90,.12); color:var(--success); }
  .badge-warning{ background:rgba(183,121,31,.12); color:var(--warning); }
  .badge-danger{ background:rgba(192,57,43,.12); color:var(--danger); }
  .badge-navy{ background:rgba(11,31,58,.08); color:var(--navy); } html.dark .badge-navy{ background:rgba(200,155,60,.12); color:var(--gold-light); }
  .sidebar{ transition: width .25s ease, transform .28s ease; }
  .sidebar.collapsed{ width:76px; }
  .sidebar.collapsed .nav-label, .sidebar.collapsed .brand-text{ display:none; }
  .brand-logo-collapsed{ display:none; }
  .sidebar.collapsed .brand-logo-expanded{ display:none; }
  .sidebar.collapsed .brand-logo-collapsed{ display:block; }
  .sidebar.collapsed .nav-item{ justify-content:center; }
  #sidebar-backdrop{ display:none; position:fixed; inset:0; background:rgba(8,15,28,.55); z-index:95; }
  #sidebar-backdrop.active{ display:block; animation:fadeIn .2s ease; }
  @media (max-width: 767px){
    .sidebar{ position:fixed; top:0; left:0; z-index:100; width:260px !important; height:100vh; transform:translateX(-100%); }
    .sidebar.collapsed{ width:260px !important; }
    .sidebar.collapsed .nav-label, .sidebar.collapsed .brand-text{ display:block; }
    .sidebar.collapsed .nav-item{ justify-content:flex-start; }
    .sidebar.mobile-open{ transform:translateX(0); }
  }
  .nav-item{ display:flex; align-items:center; gap:.85rem; padding:.65rem .9rem; border-radius:10px; color:#c7d2e0; font-size:.86rem; font-weight:500; cursor:pointer; transition:.15s; }
  .nav-item:hover{ background:rgba(255,255,255,.06); color:#fff; }
  .nav-item.active{ background: linear-gradient(90deg, rgba(200,155,60,.18), rgba(200,155,60,.02)); color:#fff; border-left:3px solid var(--gold); padding-left:calc(.9rem - 3px); }
  .page{ display:none; animation: fadeSlide .4s ease; } .page.active{ display:block; }
  @keyframes fadeSlide{ from{ opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
  .modal-backdrop{ display:none; position:fixed; inset:0; background:rgba(8,15,28,.55); backdrop-filter:blur(3px); z-index:200; align-items:center; justify-content:center; animation:fadeIn .2s ease; }
  .modal-backdrop.active{ display:flex; }
  .modal-box{ background:var(--card); border:1px solid var(--border); border-radius:16px; width:100%; max-width:560px; max-height:88vh; overflow-y:auto; animation:popIn .25s cubic-bezier(.2,.9,.3,1.2); }
  @keyframes popIn{ from{opacity:0; transform:scale(.95) translateY(10px);} to{opacity:1; transform:scale(1) translateY(0);} }
  table.data-table{ width:100%; border-collapse:collapse; font-size:.85rem; }
  table.data-table th{ text-align:left; padding:.75rem 1rem; font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--sub); border-bottom:1px solid var(--border); font-weight:700; white-space:nowrap; }
  table.data-table td{ padding:.75rem 1rem; border-bottom:1px solid var(--border); color:var(--ink); }
  table.data-table tbody tr{ transition:.15s; } table.data-table tbody tr:hover{ background:var(--accent); }
  .toast{ animation: toastIn .3s ease, toastOut .3s ease 3.7s forwards; }
  @keyframes toastIn{ from{opacity:0; transform:translateX(30px);} to{opacity:1; transform:translateX(0);} }
  @keyframes toastOut{ to{opacity:0; transform:translateX(30px);} }
  .fade-in-card{ animation: fadeSlide .5s ease backwards; }
  input, select, textarea{ background:var(--bg); border:1px solid var(--border); color:var(--ink); }
  input:focus, select:focus, textarea:focus{ outline:2px solid var(--gold); outline-offset:1px; border-color:var(--gold); }
  .progress-track{ background:var(--accent); border-radius:999px; overflow:hidden; height:8px; }
  .progress-fill{ height:100%; border-radius:999px; transition:width 1s ease; }
</style>
</head>

let CASES = [], EXPENSES = [], EVENTS = [], CASHBOOK_MANUAL = [];
const EVENT_TYPES = ["Court Date","Filing Deadline"];

function generateData(){
  for(let i=1;i<=28;i++){
    const client = rand(FIRST_NAMES)+" "+rand(LAST_NAMES);
    const charged = randInt(25000,650000);
    const payments = [];
    let paid = 0;
    const numPayments = randInt(0,3);
    for(let p=0;p<numPayments;p++){
      const amt = randInt(5000, Math.max(6000, Math.round((charged-paid)*0.6)));
      if(paid+amt > charged) break;
      payments.push({ id:uid(), amount:amt, method:rand(PAYMENT_METHODS), date: randomDate(90,0) });
      paid += amt;
    }
    CASES.push({
      id:i, number:"CKA/"+(2024+randInt(0,2))+"/"+pad(randInt(1,299),3),
      client, area: rand(PRACTICE_AREAS), status: rand(CASE_STATUSES),
      opened: randomDate(400,-5), charged, payments, phone: phoneKE()
    });
  }
  for(let i=1;i<=25;i++){
    EXPENSES.push({
      id:i, ref:"EXP-"+pad(900+i,4), category: rand(EXPENSE_CATEGORIES),
      amount: randInt(1500,85000), date: randomDate(60,0),
      status: rand(["Approved","Pending","Rejected","Approved","Approved"]),
      submittedBy: rand(["Carol Mutegi","Mercy Wanjiru"])
    });
  }
  // Court dates & deadlines, each linked to a real case
  const openCases = CASES.filter(c=>c.status!=="Closed");
  const eventTitles = {
    "Court Date": ["Hearing","Mention","Ruling","Judgment"],
    "Filing Deadline": ["Submission Deadline","Response Deadline","Compliance Deadline"]
  };
  for(let i=1;i<=20;i++){
    const c = rand(openCases.length? openCases : CASES);
    const type = rand(EVENT_TYPES);
    const label = rand(eventTitles[type]);
    EVENTS.push({
      id:uid(), caseId:c.id, caseNumber:c.number, client:c.client,
      type, title:label+" — "+c.client, date: randomDate(10,45), notes:""
    });
  }
  CASES.sort((a,b)=>b.opened-a.opened);
  EVENTS.sort((a,b)=>a.date-b.date);
  const seeds = [
    { desc:"Bank charges — KCB current account", type:"out", amount:1200 },
    { desc:"Petty cash top-up", type:"in", amount:10000 },
    { desc:"Interest earned on office account", type:"in", amount:850 },
  ];
  seeds.forEach(s=> CASHBOOK_MANUAL.push({ id:uid(), date:randomDate(45,0), description:s.desc, type:s.type, amount:s.amount }));
}
function casePaid(c){ return c.payments.reduce((a,b)=>a+b.amount,0); }
function caseBalance(c){ return c.charged - casePaid(c); }
const VAT_RATE = 0.16;
function vatBreakdown(chargedInclusive){
  const vatAmount = chargedInclusive * (VAT_RATE/(1+VAT_RATE));
  return { feeExclVAT: chargedInclusive - vatAmount, vatAmount, total: chargedInclusive };
}
function caseEvents(id){ return EVENTS.filter(e=>e.caseId===id).sort((a,b)=>a.date-b.date); }

// ============ PERSISTENCE (localStorage) ============
const STORAGE_KEY = "ckmutegi_tracker_data_v1";
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ CASES, EXPENSES, EVENTS, CASHBOOK_MANUAL }));
  }catch(err){ console.warn("Could not save data locally:", err); }
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(!data || !Array.isArray(data.CASES)) return false;
    CASES = data.CASES.map(c=>({ ...c, opened:new Date(c.opened), payments:(c.payments||[]).map(p=>({ ...p, date:new Date(p.date) })) }));
    EXPENSES = (data.EXPENSES||[]).map(e=>({ ...e, date:new Date(e.date) }));
    EVENTS = (data.EVENTS||[]).map(e=>({ ...e, date:new Date(e.date) }));
    CASHBOOK_MANUAL = (data.CASHBOOK_MANUAL||[]).map(m=>({ ...m, date:new Date(m.date) }));
    return true;
  }catch(err){ console.warn("Could not load saved data:", err); return false; }
}
const hadSavedData = loadState();
if(!hadSavedData){ generateData(); saveState(); }

// One-time top-up: add 10 more expense records to sessions that already had saved data
// (fresh installs already get 25 expenses directly from generateData() above)
if(hadSavedData){
  (function addMoreExpensesMigration(){
    const FLAG = "ckmutegi_migration_10_more_expenses";
    if(localStorage.getItem(FLAG)) return;
    const maxNum = EXPENSES.reduce((max,e)=>{
      const m = /EXP-(\d+)/.exec(e.ref);
      return m? Math.max(max, parseInt(m[1],10)) : max;
    }, 900);
    for(let i=1;i<=10;i++){
      EXPENSES.push({
        id: uid(), ref:"EXP-"+pad(maxNum+i,4), category: rand(EXPENSE_CATEGORIES),
        amount: randInt(1500,85000), date: randomDate(60,0),
        status: rand(["Approved","Pending","Rejected","Approved","Approved"]),
        submittedBy: rand(["Carol Mutegi","Mercy Wanjiru"])
      });
    }
    localStorage.setItem(FLAG, "1");
    saveState();
  })();
} else {
  localStorage.setItem("ckmutegi_migration_10_more_expenses", "1");
}

// ============ CASH BOOK ============
function buildCashbookLedger(){
  const entries = [];
  CASES.forEach(c=> c.payments.forEach(p=> entries.push({
    id:"pay-"+p.id, date:p.date, description:"Payment received — "+c.client+" ("+c.number+")", method:p.method, type:"in", amount:p.amount
  })));
  EXPENSES.filter(e=>e.status==="Approved").forEach(e=> entries.push({
    id:"exp-"+e.id, date:e.date, description:e.category+" — "+e.ref, method:"", type:"out", amount:e.amount
  }));
  CASHBOOK_MANUAL.forEach(m=> entries.push({ id:"man-"+m.id, date:m.date, description:m.description, method:"", type:m.type, amount:m.amount }));
  entries.sort((a,b)=>a.date-b.date);
  let running = 0;
  entries.forEach(e=>{ running += (e.type==="in"? e.amount : -e.amount); e.balance = running; });
  return entries;
}

// ============ NAV / SHELL ============
const NAV = [
  {id:"dashboard", label:"Dashboard", icon:"fa-gauge-high"},
  {id:"cases", label:"Cases & Billing", icon:"fa-briefcase"},
  {id:"calendar", label:"Calendar", icon:"fa-calendar-days"},
  {id:"expenses", label:"Expenses", icon:"fa-receipt"},
  {id:"cashbook", label:"Cash Book", icon:"fa-book"},
];
const PAGE_TITLES = {
  dashboard:["Dashboard","Firm billing and spending at a glance"],
  calendar:["Calendar","Court dates and deadlines linked to your cases"],
  cases:["Cases & Billing","Track what each case was charged, what's been paid, and what's owed"],
  expenses:["Expenses","Track and approve firm spending"],
  cashbook:["Cash Book","A running record of every shilling in and out of the firm"],
};
const PAGE_RENDERERS = {};
function renderNav(){
  document.getElementById("nav-list").innerHTML = NAV.map(n=>`<div class="nav-item ${n.id==='dashboard'?'active':''}" data-nav="${n.id}" onclick="goTo('${n.id}')"><i class="fa-solid ${n.icon} w-5 text-center"></i><span class="nav-label">${n.label}</span></div>`).join("");
}
let currentPage="dashboard";
function goTo(id){
  currentPage=id;
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  const navEl = document.querySelector(`[data-nav="${id}"]`); if(navEl) navEl.classList.add("active");
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  let pageEl = document.getElementById("page-"+id);
  if(!pageEl){ pageEl = document.createElement("div"); pageEl.id="page-"+id; pageEl.className="page"; document.getElementById("pages-root").appendChild(pageEl); }
  const [title,sub] = PAGE_TITLES[id]||["",""];
  pageEl.innerHTML = `<div class="mb-5 flex items-center justify-between flex-wrap gap-3">
    <div><h1 class="text-2xl font-bold tracking-tight">${title}</h1><p class="text-sm mt-0.5" style="color:var(--sub)">${sub}</p></div>
    <div id="page-actions-${id}" class="flex gap-2"></div></div>
    <div id="page-body-${id}"></div>`;
  if(PAGE_RENDERERS[id]) PAGE_RENDERERS[id]();

function toast(title,msg,type="info"){
  const colors={info:"#0B1F3A",success:"#1C8A5A",warning:"#B7791F",danger:"#C0392B"};
  const icons={info:"fa-circle-info",success:"fa-circle-check",warning:"fa-triangle-exclamation",danger:"fa-circle-xmark"};
  const el=document.createElement("div");
  el.className="toast card p-3 flex items-start gap-3 shadow-lg";
  el.innerHTML=`<div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0" style="background:${colors[type]}22;color:${colors[type]}"><i class="fa-solid ${icons[type]}"></i></div>
    <div class="flex-1 min-w-0"><p class="text-sm font-semibold">${title}</p><p class="text-xs mt-0.5" style="color:var(--sub)">${msg}</p></div>
    <button onclick="this.parentElement.remove()" class="text-xs" style="color:var(--sub)"><i class="fa-solid fa-xmark"></i></button>`;
  document.getElementById("toast-container").appendChild(el);
  setTimeout(()=>el.remove(),4100);
}
function badge(status){
  const map={Open:"navy","In Court":"gold","Pending Filing":"warning",Closed:"navy","On Appeal":"navy",Approved:"success",Pending:"warning",Rejected:"danger",Paid:"success","Partially Paid":"warning",Unpaid:"danger"};

}

  EVENTS = EVENTS.filter(e=>e.caseId!==id);
  saveState();
  closeModal();
  toast("Case deleted", (c?c.number:"The matter")+" has been removed", "success");

  if(currentPage==="dashboard") renderDashboard();

function deletePayment(caseId, paymentId){

  saveState();
  closeModal();
  toast("Payment removed", "The payment entry has been deleted", "success");
  if(currentPage==="cases") renderCaseTable();
  if(currentPage==="dashboard") renderDashboard();
  viewCase(caseId);

function receiptNumber(p){
  const year = p.date.getFullYear();
  const num = ((p.id % 900000) + 100000);
  return "REC-" + year + "-" + String(num).padStart(6,"0");
}
// ============ REPORT EXPORTS (CSV / PDF) ============
function csvEscape(val){
  const s = String(val==null? "" : val);
  return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
}
function downloadCSV(filenamePrefix, headers, rows){
  const lines = [headers.map(csvEscape).join(",")].concat(rows.map(r=>r.map(csvEscape).join(",")));
  const blob = new Blob([lines.join("\n")], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filenamePrefix + "_" + new Date().toISOString().slice(0,10) + ".csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast("CSV downloaded", a.download+" saved", "success");
}

function exportReportPDF(title, subtitle, headers, rows, filenamePrefix){
  if(typeof html2canvas === "undefined" || typeof window.jspdf === "undefined"){
    toast("PDF engine unavailable","Falling back to CSV instead","warning");
    downloadCSV(filenamePrefix, headers, rows);
    return;
  }
  const container = document.createElement("div");
  container.style.position = "fixed";
  container.style.left = "-9999px";
  container.style.top = "0";
  container.style.background = "#fff";
  container.style.padding = "15mm";
  container.style.width = "200mm";
  container.innerHTML = buildReportLetterheadHTML(title, subtitle) + buildReportTableHTML(headers, rows) +
    `<p style="text-align:center;font-size:9px;color:#5b6472;margin-top:6mm;">Generated ${new Date().toLocaleString("en-KE")} · CK Mutegi &amp; Company Advocates · System-generated report</p>`;
  document.body.appendChild(container);
  toast("Generating PDF","Please wait a moment...","info");
  html2canvas(container, { scale: 2.5, backgroundColor:"#ffffff" }).then(canvas=>{
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit:"mm", format:"a4", orientation:"portrait" });
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const marginTop = 10, marginBottom = 10;
    const usablePageHeight = pageHeight - marginTop - marginBottom;
    const imgWidthMM = pageWidth - 20;
    const imgHeightMM = canvas.height * imgWidthMM / canvas.width;
    const imgData = canvas.toDataURL("image/png");
    let heightLeft = imgHeightMM;
    let position = marginTop;
    pdf.addImage(imgData, "PNG", 10, position, imgWidthMM, imgHeightMM);
    heightLeft -= usablePageHeight;
    while(heightLeft > 0){
      position = marginTop - (imgHeightMM - heightLeft);
      pdf.addPage();
      pdf.addImage(imgData, "PNG", 10, position, imgWidthMM, imgHeightMM);
      heightLeft -= usablePageHeight;
    }
    pdf.save(filenamePrefix + "_" + new Date().toISOString().slice(0,10) + ".pdf");
    document.body.removeChild(container);
    toast("PDF downloaded", filenamePrefix+" report saved", "success");
  }).catch(()=>{
    document.body.removeChild(container);
    toast("PDF generation failed","Falling back to CSV instead","warning");
    downloadCSV(filenamePrefix, headers, rows);
  });
}

    <div class="flex items-start gap-3 cursor-pointer" onclick="viewCase(${e.caseId})">
      <div class="w-10 h-10 rounded-lg flex flex-col items-center justify-center shrink-0 text-white" style="background:${e.type==='Court Date'?'var(--danger)':'var(--warning)'}">
        <span class="text-[10px] leading-none">${e.date.toLocaleDateString('en-KE',{month:'short'})}</span><span class="text-sm font-bold leading-none">${e.date.getDate()}</span>
      </div>
      <div class="min-w-0"><p class="text-sm font-medium truncate">${e.title}</p><p class="text-xs" style="color:var(--sub)">${e.caseNumber} · ${e.type}</p></div>
    </div>`).join("") : `<p class="text-sm text-center py-6" style="color:var(--sub)">Nothing scheduled in the next 30 days.</p>`;
}
function renderCalendarGrid(){
  const base = new Date(); base.setMonth(base.getMonth()+calMonthOffset); base.setDate(1);
  document.getElementById("cal-title").textContent = base.toLocaleDateString("en-KE",{month:"long",year:"numeric"});
  const firstDay = base.getDay();
  const daysInMonth = new Date(base.getFullYear(), base.getMonth()+1, 0).getDate();
  let cells = "";
  for(let i=0;i<firstDay;i++) cells += `<div></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dayDate = new Date(base.getFullYear(), base.getMonth(), d);
    const dayEvents = EVENTS.filter(e=> e.date.getFullYear()===dayDate.getFullYear() && e.date.getMonth()===dayDate.getMonth() && e.date.getDate()===d);
    const isToday = new Date().toDateString()===dayDate.toDateString();
    cells += `<div class="min-h-[64px] rounded-lg p-1 border text-left align-top" style="border-color:var(--border); ${isToday?'outline:2px solid var(--gold); outline-offset:-2px;':''}">
      <p class="text-xs font-semibold mb-1 ${isToday?'text-white w-5 h-5 flex items-center justify-center rounded-full':''}" style="${isToday?'background:var(--gold)':''}">${d}</p>
      ${dayEvents.slice(0,2).map(e=>`<div onclick='viewCase(${e.caseId})' class="text-[9px] mb-0.5 px-1 py-0.5 rounded truncate cursor-pointer text-white" style="background:${e.type==='Court Date'?'var(--danger)':'var(--warning)'}">${e.title}</div>`).join("")}
      ${dayEvents.length>2? `<p class="text-[9px]" style="color:var(--sub)">+${dayEvents.length-2} more</p>`:""}
    </div>`;
  }
  document.getElementById("cal-grid").innerHTML = cells;
}
function openEventModal(prefCaseId){
  const caseOptions = CASES.map(c=>`${c.number} — ${c.client}`);
  const defaultIdx = prefCaseId? CASES.findIndex(c=>c.id===prefCaseId) : -1;
  openModal(`<div class="flex items-center justify-between p-5 border-b" style="border-color:var(--border)">
    <div class="flex items-center gap-3"><div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background:var(--navy)"><i class="fa-solid fa-calendar-days text-sm" style="color:var(--gold)"></i></div><h3 class="font-bold text-lg">Add Court Date / Deadline</h3></div>
    <button onclick="closeModal()" class="icon-btn"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="p-5 space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div class="col-span-2"><label class="text-xs font-semibold mb-1 block" style="color:var(--sub)">Case / Matter</label>
          <select id="ev-case" class="w-full px-3 py-2 rounded-lg text-sm">${caseOptions.map((o,i)=>`<option value="${CASES[i].id}" ${i===defaultIdx?'selected':''}>${o}</option>`).join("")}</select></div>
        ${selectFld("Event Type", EVENT_TYPES)}
        ${fld("Date","date")}
        ${fld("Notes / Title","text","e.g. Mention before Chuka Law Courts",true)}
      </div>
    </div>
    <div class="flex justify-end gap-2 p-5 border-t" style="border-color:var(--border)">
      <button onclick="closeModal()" class="btn btn-outline">Cancel</button>
      <button onclick="submitNewEvent(this)" class="btn btn-primary"><i class="fa-solid fa-check"></i>Save</button>
    </div>`);
}
function submitNewEvent(btn){
  const box = btn.closest(".modal-box");
  const caseId = parseInt(document.getElementById("ev-case").value);
  const type = box.querySelector("select:nth-of-type(2)").value;
  const dateVal = box.querySelector('input[type="date"]').value;
  const note = box.querySelector('input[type="text"]').value.trim();
  const c = CASES.find(x=>x.id===caseId);
  if(!c){ toast("Select a case","Please choose a case for this date","warning"); return; }
  const date = dateVal? new Date(dateVal+"T00:00:00") : new Date();
  EVENTS.push({ id:uid(), caseId:c.id, caseNumber:c.number, client:c.client, type, title: note||(type+" — "+c.client), date, notes:note });
  EVENTS.sort((a,b)=>a.date-b.date);
  saveState();
  closeModal();
  toast("Date added", type+" scheduled for "+c.number, "success");
  if(currentPage==="calendar"){ renderCalendarGrid(); renderCalAgenda(); }
  if(currentPage==="dashboard") renderDashboard();
}
PAGE_RENDERERS.calendar = renderCalendar;

// ============ CASH BOOK ============
let cashbookFilter = "All";
function renderCashbook(){
  document.getElementById("page-actions-cashbook").innerHTML = `
    <button onclick="exportCashbookReport('csv')" class="btn btn-outline btn-sm"><i class="fa-solid fa-file-csv"></i>CSV</button>
    <button onclick="exportCashbookReport('pdf')" class="btn btn-outline btn-sm"><i class="fa-solid fa-file-pdf"></i>PDF</button>
    <button onclick="openCashEntryModal()" class="btn btn-gold btn-sm"><i class="fa-solid fa-plus"></i>Add Entry</button>`;
  const ledger = buildCashbookLedger();
  const totalIn = ledger.filter(e=>e.type==="in").reduce((a,e)=>a+e.amount,0);
  const totalOut = ledger.filter(e=>e.type==="out").reduce((a,e)=>a+e.amount,0);
  const balance = ledger.length? ledger[ledger.length-1].balance : 0;
  document.getElementById("page-body-cashbook").innerHTML = `
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
      <div class="card p-4"><p class="text-xs" style="color:var(--sub)">Total In</p><p class="text-xl font-bold" style="color:var(--success)">${fmtKES(totalIn)}</p></div>
      <div class="card p-4"><p class="text-xs" style="color:var(--sub)">Total Out</p><p class="text-xl font-bold" style="color:var(--danger)">${fmtKES(totalOut)}</p></div>
      <div class="card p-4"><p class="text-xs" style="color:var(--sub)">Current Balance</p><p class="text-xl font-bold" style="color:${balance>=0?'var(--success)':'var(--danger)'}">${fmtKES(balance)}</p></div>
    </div>
    <div class="card p-4">
      <div class="flex flex-wrap gap-3 mb-4">
        <select onchange="cashbookFilter=this.value; renderCashbookTable()" class="px-3 py-2 rounded-lg text-sm">
          <option value="All">All Entries</option><option value="in">Money In</option><option value="out">Money Out</option>
        </select>
      </div>
      <div class="overflow-x-auto"><table class="data-table" id="cashbook-table"></table></div>
    </div>`;
  renderCashbookTable();
}
function renderCashbookTable(){
  const ledger = buildCashbookLedger().slice().reverse();
  const rows = ledger.filter(e=>cashbookFilter==="All"||e.type===cashbookFilter);
  document.getElementById("cashbook-table").innerHTML = `
    <thead><tr><th>Date</th><th>Description</th><th>Money In</th><th>Money Out</th><th>Running Balance</th><th></th></tr></thead>
    <tbody>${rows.map(e=>`<tr>
      <td class="text-xs">${fmtDate(e.date)}</td>
      <td>${e.description}${e.method?` <span style="color:var(--sub)" class="text-xs">· ${e.method}</span>`:""}</td>
      <td style="color:var(--success)">${e.type==="in"? fmtKES(e.amount):""}</td>
      <td style="color:var(--danger)">${e.type==="out"? fmtKES(e.amount):""}</td>
      <td class="font-semibold">${fmtKES(e.balance)}</td>
      <td>${(e.id.startsWith("man-") && isManagingPartner())? `<button onclick="confirmDeleteCashEntry('${e.id.replace('man-','')}')" class="icon-btn !w-7 !h-7 hover:!text-red-500" title="Delete"><i class="fa-solid fa-trash text-xs"></i></button>` : ""}</td>
    </tr>`).join("") || `<tr><td colspan="6" class="text-center py-8" style="color:var(--sub)">No entries yet.</td></tr>`}</tbody>`;
}
function openCashEntryModal(){
  openModal(`<div class="flex items-center justify-between p-5 border-b" style="border-color:var(--border)">
    <div class="flex items-center gap-3"><div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background:var(--navy)"><i class="fa-solid fa-book text-sm" style="color:var(--gold)"></i></div><h3 class="font-bold text-lg">Add Cash Book Entry</h3></div>
    <button onclick="closeModal()" class="icon-btn"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="p-5 space-y-4">
      <p class="text-xs" style="color:var(--sub)">Use this for money in or out that isn't a client payment or a logged expense — e.g. bank charges, interest earned, petty cash top-ups.</p>
      <div class="grid grid-cols-2 gap-4">
        ${selectFld("Type", ["Money In","Money Out"])}
        ${fld("Amount (KES)","number","e.g. 1500")}
        ${fld("Date","date")}
        ${fld("Description","text","e.g. Bank charges",true)}
      </div>
    </div>
    <div class="flex justify-end gap-2 p-5 border-t" style="border-color:var(--border)">
      <button onclick="closeModal()" class="btn btn-outline">Cancel</button>
      <button onclick="submitCashEntry(this)" class="btn btn-primary"><i class="fa-solid fa-check"></i>Save Entry</button>
    </div>`);
}
function deleteCashEntry(manualId){
  CASHBOOK_MANUAL = CASHBOOK_MANUAL.filter(m=>String(m.id)!==String(manualId));
  saveState();
  closeModal();
  toast("Entry removed", "The cash book entry has been deleted", "success");
  if(currentPage==="cashbook") renderCashbook();
  if(currentPage==="dashboard") renderDashboard();
}
function confirmDeleteCashEntry(manualId){
  confirmAction("Delete this entry?", "This manual cash book entry will be permanently removed.", "Yes, Delete", "deleteCashEntry('"+manualId+"')");
}
function submitCashEntry(btn){
  const box = btn.closest(".modal-box");
  const typeVal = box.querySelector("select").value;
  const amount = parseFloat(box.querySelector('input[type="number"]').value);
  const dateVal = box.querySelector('input[type="date"]').value;
  const desc = box.querySelector('input[type="text"]').value.trim();
  if(!amount || amount<=0){ toast("Amount required","Please enter a valid amount","warning"); return; }
  if(!desc){ toast("Description required","Please describe this entry","warning"); return; }
  const date = dateVal? new Date(dateVal+"T00:00:00") : new Date();
  CASHBOOK_MANUAL.push({ id:uid(), date, description:desc, type: typeVal==="Money In"?"in":"out", amount });
  saveState();
  closeModal();
  toast("Entry added", desc+" logged to the cash book", "success");
  if(currentPage==="cashbook") renderCashbook();
  if(currentPage==="dashboard") renderDashboard();
}
function exportCashbookReport(format){
  const ledger = buildCashbookLedger().slice().reverse().filter(e=>cashbookFilter==="All"||e.type===cashbookFilter);
  const rows = ledger.map(e=>[fmtDate(e.date), e.description+(e.method?" ("+e.method+")":""), e.type==="in"?fmtKES(e.amount):"", e.type==="out"?fmtKES(e.amount):"", fmtKES(e.balance)]);
  const headers = ["Date","Description","Money In","Money Out","Running Balance"];
  if(format==="csv") downloadCSV("Cash_Book", headers, rows);
  else exportReportPDF("Cash Book Report", "As at "+fmtDate(new Date()), headers, rows, "Cash_Book");
}
PAGE_RENDERERS.cashbook = renderCashbook;

// ============ EXPENSES ============
let expFilter = {category:"All", status:"Pending"};
function renderExpenses(){
  document.getElementById("page-actions-expenses").innerHTML = `
    <button onclick="exportExpensesReport('csv')" class="btn btn-outline btn-sm"><i class="fa-solid fa-file-csv"></i>CSV</button>
    <button onclick="exportExpensesReport('pdf')" class="btn btn-outline btn-sm"><i class="fa-solid fa-file-pdf"></i>PDF</button>
    <button onclick="openExpenseModal()" class="btn btn-gold btn-sm"><i class="fa-solid fa-plus"></i>Add Expense</button>`;
  const total = EXPENSES.reduce((a,e)=>a+e.amount,0);
  const approved = EXPENSES.filter(e=>e.status==="Approved").reduce((a,e)=>a+e.amount,0);
  const pending = EXPENSES.filter(e=>e.status==="Pending").reduce((a,e)=>a+e.amount,0);
  document.getElementById("page-body-expenses").innerHTML = `
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
      <div class="card p-4"><p class="text-xs" style="color:var(--sub)">Total Recorded</p><p class="text-xl font-bold">${fmtKES(total)}</p></div>
      <div class="card p-4"><p class="text-xs" style="color:var(--sub)">Approved</p><p class="text-xl font-bold" style="color:var(--success)">${fmtKES(approved)}</p></div>
      <div class="card p-4"><p class="text-xs" style="color:var(--sub)">Awaiting Approval</p><p class="text-xl font-bold" style="color:var(--warning)">${fmtKES(pending)}</p></div>
    </div>
    <div class="flex flex-wrap gap-3 mb-2">
      <select onchange="expFilter.category=this.value; renderExpenseGrid()" class="px-3 py-2 rounded-lg text-sm"><option value="All">All Categories</option>${EXPENSE_CATEGORIES.map(c=>`<option>${c}</option>`).join("")}</select>
      <select onchange="expFilter.status=this.value; renderExpenseGrid()" class="px-3 py-2 rounded-lg text-sm">${["Pending","All","Approved","Rejected"].map(s=>`<option value="${s}" ${expFilter.status===s?'selected':''}>${s==="All"?"All Statuses":s}</option>`).join("")}</select>
    </div>
    <p class="text-xs mb-4" style="color:var(--sub)">Showing pending expenses awaiting action. Approved and rejected expenses move out of this view automatically — switch the status filter above to see them.</p>
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4" id="expenses-grid"></div>`;
  renderExpenseGrid();
}
function renderExpenseGrid(){
  const list = EXPENSES.filter(e=>(expFilter.category==="All"||e.category===expFilter.category)&&(expFilter.status==="All"||e.status===expFilter.status)).slice().sort((a,b)=>b.date-a.date);
  document.getElementById("expenses-grid").innerHTML = list.map((e,i)=>`
    <div class="card p-4 fade-in-card" style="animation-delay:${i*40}ms">
      <div class="flex justify-between items-start"><div><p class="font-bold text-sm">${e.ref}</p><p class="text-xs" style="color:var(--sub)">${e.category}</p></div>${badge(e.status)}</div>
      <p class="text-xl font-bold mt-2">${fmtKES(e.amount)}</p>
      <p class="text-xs mt-1" style="color:var(--sub)">Submitted by ${e.submittedBy}</p>
      <p class="text-xs" style="color:var(--sub)">${fmtDate(e.date)}</p>
      ${isManagingPartner()? `
      <div class="flex gap-2 mt-3 pt-3 border-t" style="border-color:var(--border)">
        ${e.status==="Pending" ? `
          <button onclick="setExpenseStatus(${e.id},'Approved')" class="btn btn-ghost btn-sm flex-1 justify-center" style="color:var(--success)"><i class="fa-solid fa-check"></i>Approve</button>
          <button onclick="setExpenseStatus(${e.id},'Rejected')" class="btn btn-ghost btn-sm flex-1 justify-center" style="color:var(--danger)"><i class="fa-solid fa-xmark"></i>Reject</button>
        ` : `
          <button onclick="setExpenseStatus(${e.id},'Pending')" class="btn btn-ghost btn-sm flex-1 justify-center"><i class="fa-solid fa-rotate-left"></i>Revert to Pending</button>
        `}
        <button onclick="confirmDeleteExpense(${e.id})" class="icon-btn !w-8 !h-8 hover:!text-red-500" title="Delete"><i class="fa-solid fa-trash text-xs"></i></button>
      </div>` : ""}
    </div>`).join("") || `<p class="col-span-full text-center py-10" style="color:var(--sub)">No expenses match these filters.</p>`;
}
function deleteExpense(id){
  const e = EXPENSES.find(x=>x.id===id);
  EXPENSES = EXPENSES.filter(x=>x.id!==id);
  saveState();
  closeModal();
  toast("Expense deleted", (e?e.ref:"The expense")+" has been removed", "success");
  renderExpenseGrid();
  if(currentPage==="dashboard") renderDashboard();
}
function confirmDeleteExpense(id){
  const e = EXPENSES.find(x=>x.id===id);
  confirmAction("Delete "+(e?e.ref:"this expense")+"?", "This will permanently remove this expense record.", "Yes, Delete", "deleteExpense("+id+")");
}
function setExpenseStatus(id,status){
  const e = EXPENSES.find(x=>x.id===id); e.status=status;
  saveState();
  const messages = {
    Approved: e.ref+" approved — now reflected in the Cash Book",
    Rejected: e.ref+" rejected — won't appear in the Cash Book",
    Pending: e.ref+" moved back to Pending for review",
  };
  const toastType = status==="Approved"?"success":status==="Rejected"?"danger":"info";
  toast("Expense "+status.toLowerCase(), messages[status], toastType);
  renderExpenseGrid();
  if(currentPage==="dashboard") renderDashboard();
  if(currentPage==="cashbook") renderCashbook();
}
function openExpenseModal(){
  openModal(`<div class="flex items-center justify-between p-5 border-b" style="border-color:var(--border)">
    <div class="flex items-center gap-3"><div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background:var(--navy)"><i class="fa-solid fa-receipt text-sm" style="color:var(--gold)"></i></div><h3 class="font-bold text-lg">Add Expense</h3></div>
    <button onclick="closeModal()" class="icon-btn"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="p-5 space-y-4">
      <div class="grid grid-cols-2 gap-4">
        ${selectFld("Category", EXPENSE_CATEGORIES)}
        ${fld("Amount (KES)","number","e.g. 12000")}
        ${fld("Date","date")}
        ${selectFld("Submitted By", [currentUser().name, ...Object.values(USER_PROFILES).map(u=>u.name).filter(n=>n!==currentUser().name)])}
        ${fld("Notes","textarea","",true)}
      </div>
    </div>
    <div class="flex justify-end gap-2 p-5 border-t" style="border-color:var(--border)">
      <button onclick="closeModal()" class="btn btn-outline">Cancel</button>
      <button onclick="submitNewExpense(this)" class="btn btn-primary"><i class="fa-solid fa-check"></i>Submit Expense</button>
    </div>`);
}
function submitNewExpense(btn){
  const box = btn.closest(".modal-box");
  const selects = box.querySelectorAll("select"); const inputs = box.querySelectorAll("input");
  const category = selects[0].value;
  const amount = parseFloat(inputs[0].value) || 5000;
  const submittedBy = selects[1].value;
  EXPENSES.unshift({ id:uid(), ref:"EXP-"+pad(randInt(1000,9999),4), category, amount, date:new Date(), status:"Pending", submittedBy });
  saveState();
  closeModal();
  toast("Expense submitted", fmtKES(amount)+" logged under "+category, "success");
  if(currentPage==="expenses") renderExpenseGrid();
  if(currentPage==="dashboard") renderDashboard();
}
function exportExpensesReport(format){
  const rows = EXPENSES.filter(e=>(expFilter.category==="All"||e.category===expFilter.category)&&(expFilter.status==="All"||e.status===expFilter.status))
    .slice().sort((a,b)=>b.date-a.date)
    .map(e=>[e.ref, e.category, fmtKES(e.amount), fmtDate(e.date), e.status, e.submittedBy]);
  const headers = ["Ref","Category","Amount","Date","Status","Submitted By"];
  if(format==="csv") downloadCSV("Expenses", headers, rows);
  else exportReportPDF("Expenses Report", "As at "+fmtDate(new Date()), headers, rows, "Expenses");
}
PAGE_RENDERERS.expenses = renderExpenses;

// ============ INIT ============
function confirmResetData(){
  if(!isManagingPartner()){ toast("Not available","Only the Managing Partner can reset data","warning"); return; }
  confirmAction("Reset all data?", "This will erase every case, expense, payment, and cash book entry you've added, and restore fresh sample data. This cannot be undone.", "Yes, Reset", "performReset()");
}
function performReset(){
  localStorage.removeItem(STORAGE_KEY);
  CASES = []; EXPENSES = []; EVENTS = []; CASHBOOK_MANUAL = [];
  generateData();
  saveState();
  closeModal();
  toast("Data reset", "Fresh sample data has been loaded", "success");
  goTo(currentPage);
}
renderUserBadge();
renderNav();
goTo("dashboard");
</script>
</body>
</html>
